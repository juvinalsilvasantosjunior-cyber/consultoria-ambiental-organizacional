:root {
  --sand: #eee2cf;
  --paper: #f8f3e9;
  --terracotta: #b95436;
  --terracotta-dark: #923d28;
  --charcoal: #22231f;
  --olive: #5d6d54;
  --line: rgba(34, 35, 31, 0.18);
  --white: #fffaf1;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  background: var(--paper);
  color: var(--charcoal);
  font-family: Arial, Helvetica, sans-serif;
  line-height: 1.5;
}
a { color: inherit; text-decoration: none; }

.site-header {
  height: 96px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 5vw;
  border-bottom: 1px solid var(--line);
  background: rgba(248, 243, 233, 0.92);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 20;
}
.brand { display: flex; flex-direction: column; width: fit-content; }
.brand span { font-family: Georgia, 'Times New Roman', serif; font-size: 25px; font-weight: 700; line-height: 1.1; }
.brand small { color: var(--olive); text-transform: uppercase; letter-spacing: .18em; font-size: 9px; margin-top: 5px; }
nav { display: flex; align-items: center; gap: 35px; }
nav a { font-size: 14px; padding: 36px 0 30px; border-bottom: 2px solid transparent; }
nav a:hover, nav a:focus-visible, nav a.active { color: var(--terracotta); border-color: var(--terracotta); }
.header-cta { justify-self: end; font-size: 13px; font-weight: 700; }
.header-cta span { color: var(--terracotta); margin-left: 7px; }

.hero {
  min-height: calc(100vh - 96px);
  display: grid;
  grid-template-columns: 52% 48%;
  overflow: hidden;
  border-bottom: 1px solid var(--line);
}
.hero-content { padding: clamp(60px, 8vh, 100px) 5vw 70px; position: relative; z-index: 2; }
.service-tags { display: flex; align-items: center; gap: 24px; color: var(--olive); margin-bottom: 66px; font-size: 14px; }
.service-tags i { display: block; width: 1px; height: 34px; background: var(--line); }
.eyebrow { color: var(--terracotta); text-transform: uppercase; letter-spacing: .18em; font-size: 11px; font-weight: 700; }
h1, h2 { font-family: Georgia, 'Times New Roman', serif; font-weight: 500; letter-spacing: -.045em; margin: 0; }
h1 { font-size: clamp(57px, 5.3vw, 88px); line-height: .99; max-width: 820px; }
.hero-copy { max-width: 625px; font-size: clamp(17px, 1.25vw, 21px); line-height: 1.65; margin: 34px 0 38px; color: #44453f; }
.experience-badge { display: flex; align-items: center; gap: 13px; margin: -14px 0 30px; color: var(--olive); }
.experience-badge strong { font-family: Georgia, serif; font-size: 24px; color: var(--terracotta); }
.experience-badge span { font-size: 12px; text-transform: uppercase; letter-spacing: .11em; }
.hero-actions { display: flex; align-items: center; gap: 44px; }
.button { display: inline-flex; align-items: center; justify-content: space-between; gap: 36px; padding: 19px 25px; font-weight: 700; font-size: 14px; transition: transform .2s ease, background .2s ease; }
.button:hover, .button:focus-visible { transform: translateY(-2px); }
.button-primary { color: white; background: var(--terracotta); min-width: 245px; }
.button-primary:hover { background: var(--terracotta-dark); }
.text-link { color: var(--olive); font-size: 14px; font-weight: 700; border-bottom: 1px solid var(--olive); padding-bottom: 7px; }
.text-link span { margin-left: 20px; }
.hero-visual {
  position: relative;
  background-color: #63705d;
  background-image: linear-gradient(90deg, rgba(248, 243, 233, .18), transparent 24%), url('/images/territory-hero.png');
  background-size: cover;
  background-position: center;
  min-height: 720px;
}
.hero-visual::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, var(--paper) 0%, transparent 15%); }
.hero-visual p { position: absolute; z-index: 2; bottom: 26px; right: 30px; color: rgba(255,255,255,.8); font-size: 10px; letter-spacing: .16em; text-transform: uppercase; }
.contour { position: absolute; border: 1px solid rgba(255,255,255,.3); border-radius: 43% 57% 68% 32%; z-index: 1; }
.contour-one { width: 65%; height: 50%; top: 10%; right: -15%; transform: rotate(16deg); box-shadow: 0 0 0 18px rgba(255,255,255,.06), 0 0 0 36px rgba(255,255,255,.04), 0 0 0 54px rgba(255,255,255,.03); }
.contour-two { width: 56%; height: 38%; bottom: -5%; left: 0; transform: rotate(-12deg); box-shadow: 0 0 0 16px rgba(255,255,255,.05), 0 0 0 32px rgba(255,255,255,.035); }

.section { padding: 110px 5vw; }
.section-label { display: flex; gap: 17px; align-items: center; text-transform: uppercase; letter-spacing: .18em; font-size: 10px; font-weight: 700; color: var(--olive); margin-bottom: 52px; }
.section-label span { color: var(--terracotta); }
.section-heading { display: grid; grid-template-columns: 1.25fr .75fr; gap: 10vw; align-items: end; margin-bottom: 68px; }
.section-heading h2, .experience h2, .process h2 { font-size: clamp(43px, 4.1vw, 68px); line-height: 1.04; }
.section-heading p, .experience-grid > div > p { color: #5b5d56; font-size: 17px; line-height: 1.7; max-width: 530px; }
.services-grid { display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid var(--line); border-left: 1px solid var(--line); }
.service-card { min-height: 325px; padding: 32px; border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); display: flex; flex-direction: column; transition: background .25s ease, transform .25s ease; }
.service-card:hover { background: var(--sand); transform: translateY(-3px); }
.card-number { font-family: Georgia, serif; font-size: 13px; color: var(--terracotta); }
.service-card h3 { font-family: Georgia, serif; font-size: 27px; line-height: 1.15; font-weight: 500; margin: 42px 0 18px; }
.service-card p { font-size: 14px; color: #5b5d56; line-height: 1.65; margin: 0; }
.service-card a { margin-top: auto; font-size: 11px; text-transform: uppercase; letter-spacing: .12em; font-weight: 700; }
.service-card a span { color: var(--terracotta); float: right; }

.about { padding: 0; display: grid; grid-template-columns: 1.25fr .75fr; }
.about-panel { background: var(--charcoal); color: var(--white); padding: 110px 7vw 110px 5vw; }
.section-label.light { color: #a9b19f; }
.about-kicker { color: #c9bca7; font-size: 13px; text-transform: uppercase; letter-spacing: .12em; }
.about h2 { font-size: clamp(48px, 5vw, 76px); line-height: 1.04; margin: 18px 0 34px; }
.about-copy { color: #d4d0c7; font-size: 17px; line-height: 1.8; max-width: 720px; }
.button-light { margin-top: 32px; background: var(--paper); color: var(--charcoal); }
.strengths-panel { background: var(--terracotta); color: white; padding: 112px 5vw; display: flex; flex-direction: column; justify-content: center; }
.mini-title { text-transform: uppercase; font-size: 10px; letter-spacing: .18em; margin-bottom: 44px; }
.strength-list > div { display: grid; grid-template-columns: 45px 1fr; gap: 10px; border-top: 1px solid rgba(255,255,255,.3); padding: 22px 0; }
.strength-list span { font-family: Georgia, serif; opacity: .7; }
.strength-list p { font-family: Georgia, serif; font-size: 21px; line-height: 1.25; margin: 0; }

.experience { background: var(--sand); }
.experience-grid { display: grid; grid-template-columns: .8fr 1.2fr; gap: 10vw; }
.experience-list article { display: grid; grid-template-columns: 110px 1fr; gap: 5px 30px; padding: 26px 0; border-top: 1px solid var(--line); }
.experience-list article > span { color: var(--terracotta); font-size: 10px; letter-spacing: .14em; font-weight: 700; padding-top: 8px; grid-row: 1 / span 2; }
.experience-list h3 { font-family: Georgia, serif; margin: 0; font-size: 27px; font-weight: 500; }
.experience-list p { margin: 8px 0 0; color: #5b5d56; font-size: 14px; line-height: 1.6; }

.process-grid { display: grid; grid-template-columns: .9fr 1.1fr; gap: 11vw; }
.process ol { list-style: none; margin: 0; padding: 0; }
.process li { display: grid; grid-template-columns: 60px 1fr; border-top: 1px solid var(--line); padding: 28px 0; }
.process li > span { color: var(--terracotta); font-family: Georgia, serif; }
.process h3 { margin: 0 0 7px; font-family: Georgia, serif; font-size: 25px; font-weight: 500; }
.process li p { margin: 0; color: #5b5d56; font-size: 14px; }

.contact { background: var(--olive); color: white; padding-top: 120px; padding-bottom: 120px; }
.contact .eyebrow { color: #ead0c3; }
.contact h2 { font-size: clamp(54px, 6.2vw, 94px); line-height: 1; max-width: 1150px; margin: 24px 0 32px; }
.contact > p:not(.eyebrow) { color: #dce0d8; font-size: 17px; max-width: 680px; }
.contact-actions { display: flex; align-items: center; gap: 35px; margin-top: 42px; }
.contact-link { font-size: 13px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,.55); padding: 12px 0 7px; }
.contact-link span { margin-left: 12px; color: #ead0c3; }
.contact-meta { font-size: 11px !important; letter-spacing: .08em; margin-top: 28px; }

footer { display: grid; grid-template-columns: 1fr auto 1fr; align-items: end; padding: 55px 5vw; background: var(--charcoal); color: #e8e1d6; }
.footer-brand small { color: #9ea696; }
footer > p { font-family: Georgia, serif; font-style: italic; color: #aaa89f; }
footer > div:last-child { text-align: right; font-size: 12px; }

@media (max-width: 1050px) {
  .site-header { grid-template-columns: 1fr auto; }
  nav { display: none; }
  .hero { grid-template-columns: 1fr; }
  .hero-content { padding-bottom: 80px; }
  .hero-visual { min-height: 420px; }
  .services-grid { grid-template-columns: repeat(2, 1fr); }
  .about { grid-template-columns: 1fr; }
}

@media (max-width: 700px) {
  .site-header { height: 78px; padding: 0 22px; }
  .header-cta { font-size: 0; }
  .header-cta span { font-size: 24px; }
  .brand span { font-size: 21px; }
  .hero { min-height: auto; }
  .hero-content { padding: 52px 22px 65px; }
  .service-tags { margin-bottom: 48px; gap: 13px; font-size: 12px; }
  .service-tags i { height: 24px; }
  h1 { font-size: clamp(48px, 14vw, 66px); }
  .hero-actions, .contact-actions { align-items: stretch; flex-direction: column; }
  .button { width: 100%; }
  .hero-visual { min-height: 340px; }
  .section { padding: 80px 22px; }
  .section-heading, .experience-grid, .process-grid { grid-template-columns: 1fr; gap: 35px; }
  .services-grid { grid-template-columns: 1fr; }
  .service-card { min-height: 285px; }
  .about-panel, .strengths-panel { padding: 80px 22px; }
  .experience-list article { grid-template-columns: 70px 1fr; }
  .contact h2 { font-size: 49px; }
  footer { grid-template-columns: 1fr; gap: 26px; padding: 45px 22px; }
  footer > div:last-child { text-align: left; }
}

@media (prefers-reduced-motion: no-preference) {
  .hero-content { animation: rise .65s ease both; }
  .hero-visual { animation: reveal .8s .1s ease both; }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } }
  @keyframes reveal { from { opacity: 0; transform: scale(1.02); } }
}
